name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Debug SonarCloud configuration
        run: |
          echo "=== SonarCloud Debug Info ==="
          echo "Current directory: $(pwd)"
          echo "Contents of sonar-project.properties:"
          cat sonar-project.properties
          echo ""
          echo "Checking SonarCloud project..."
          curl -s -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            "https://sonarcloud.io/api/projects/search?projects=Noo001_frontend-project-46" | jq .
          echo ""
          echo "=== End Debug ==="

      - name: SonarCloud Scan with explicit parameters
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=Noo001_frontend-project-46 \
            -Dsonar.organization=noo001 \
            -Dsonar.sources=src \
            -Dsonar.tests=__tests__ \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.test.inclusions=__tests__/**/*.js \
            -Dsonar.exclusions=node_modules/**,coverage/**,__fixtures__/**,bin/** \
            -Dsonar.verbose=true